services:

  mysql:
    image: mysql:8
    container_name: shopwavefusion-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopwavefusion
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./shopwavefusionbackend/shopwavefusionbackend
    container_name: shopwavefusion-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./finalproject
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
    container_name: shopwavefusion-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    develop:
      watch:
        - path: ./finalproject
          action: sync
          target: /app

volumes:
  mysql_data: