version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: shopwavefusion-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopwavefusion
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./shopwavefusionbackend/shopwavefusionbackend
    container_name: shopwavefusion-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./finalproject
    container_name: shopwavefusion-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  mysql_data: